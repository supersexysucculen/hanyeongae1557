<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한영애 키우기 — 신화가 될 운명</title>
<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── VARIABLES ── WHITE THEME */
:root{
  --bg:#fafafa;--bg2:#fff;--panel:#f5f5f5;--border:#ddd;
  --gold:#ff9800;--text:#333;--dim:#666;
  --ok:#4caf50;--fail:#f44336;--purple:#9c27b0;--cyan:#00bcd4;
  --font:'Malgun Gothic','Apple SD Gothic Neo','NanumGothic',sans-serif;
}

html,body{min-height:100vh;background:var(--bg);color:var(--text);
  font-family:var(--font);font-size:14px;line-height:1.45;}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;
  background:var(--bg2);border-bottom:2px solid var(--border);
  position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.hdr-title{font-size:1.2rem;font-weight:900;letter-spacing:-.5px;
  background:linear-gradient(90deg,#ff6f00,#ff9800,#ffb74d);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hdr-gold{font-size:1rem;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:4px;}
.btn-reset{background:transparent;border:1px solid var(--border);color:var(--fail);
  font-size:.65rem;padding:4px 8px;border-radius:6px;cursor:pointer;font-family:var(--font);
  transition:all .2s;white-space:nowrap;}
.btn-reset:hover{background:var(--fail);color:#fff;}

/* ── APP / MOBILE LAYOUT ── */
#app{position:relative;z-index:1;max-width:100%;margin:0;padding:0;}
.mobile-container{display:flex;flex-direction:column;align-items:center;gap:0;
  padding:20px 16px 80px;max-width:500px;margin:0 auto;}

/* ── PANEL ── */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;
  box-shadow:0 1px 4px rgba(0,0,0,.08);}
.ptitle{font-size:.7rem;font-weight:700;color:var(--dim);
  text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;}

/* ── CHARACTER PANEL ── */
.cpanel{display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;}
.stage-badge{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;}
.stag{font-size:.75rem;font-weight:700;padding:4px 12px;border-radius:20px;
  background:var(--purple);color:#fff;}
.sname{font-size:1.1rem;font-weight:900;color:var(--gold);
  text-shadow:0 0 8px rgba(255,152,0,.3);letter-spacing:-.3px;text-align:center;}

/* ── CHARACTER FRAME (ENLARGED FOR MOBILE) ── */
.cframe{position:relative;width:260px;height:340px;flex-shrink:0;overflow:visible;
  margin:10px 0;}

/* behind: rays */
.ov-rays{position:absolute;border-radius:50%;pointer-events:none;
  z-index:1;opacity:0;transition:opacity .7s;inset:-35px;}

/* image clip */
.cclip{position:absolute;inset:0;border-radius:16px;overflow:hidden;z-index:2;
  box-shadow:0 8px 24px rgba(0,0,0,.15);}
.cimg{width:100%;height:100%;object-fit:cover;display:block;transition:filter .7s ease;}
.cimg-fallback{width:100%;height:100%;
  background:linear-gradient(135deg,#f3e5ab 0%,#ffe0b2 50%,#f3e5ab 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:6rem;}

/* inner overlays */
.ov-glow{position:absolute;inset:0;z-index:1;pointer-events:none;
  opacity:0;transition:opacity .7s;border-radius:16px;}
.ov-pts{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden;border-radius:16px;}

/* outer overlays */
.ov-ring{position:absolute;inset:0;border-radius:16px;z-index:3;
  pointer-events:none;opacity:0;background:transparent;transition:opacity .7s,box-shadow .7s;}
.ov-crown{position:absolute;top:-30px;left:50%;transform:translateX(-50%);
  z-index:10;pointer-events:none;opacity:0;transition:opacity .5s;
  font-size:0;line-height:1;text-align:center;white-space:nowrap;}
.ov-godlabel{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  z-index:10;pointer-events:none;opacity:0;transition:opacity .5s;
  font-size:0;font-weight:900;color:#fff;white-space:nowrap;letter-spacing:2px;
  text-shadow:0 0 20px #ff9800,0 0 40px #ff6f00;}
.ov-aura{position:absolute;inset:-60px;z-index:0;pointer-events:none;opacity:0;
  background:radial-gradient(ellipse at 50% 50%,rgba(255,255,255,.15) 0%,rgba(255,193,7,.1) 30%,transparent 70%);
  border-radius:50%;filter:blur(15px);transition:opacity .7s;animation:cosmic-pulse 2s ease-in-out infinite;}
.ov-divine{position:absolute;inset:-80px;z-index:-1;pointer-events:none;opacity:0;
  background:conic-gradient(from 0deg,rgba(255,0,0,.15),rgba(255,127,0,.15),rgba(255,255,0,.15),
                            rgba(0,255,0,.15),rgba(0,127,255,.15),rgba(75,0,130,.15),rgba(148,0,211,.15),rgba(255,0,0,.15));
  filter:blur(25px);transition:opacity .7s;animation:divine-explosion 3s ease-in-out infinite;}

/* ═══════════════════════════════════
   TIER VISUAL RULES (WHITE THEME)
   ═══════════════════════════════════ */

.cframe[data-tier="0"] .cimg{filter:none;}

.cframe[data-tier="1"] .cimg{filter:brightness(1.08) sepia(.1);}
.cframe[data-tier="1"] .ov-glow{opacity:1;
  background:radial-gradient(ellipse at 50% 85%,rgba(255,152,0,.3) 0%,transparent 65%);
  animation:glow-breathe 3s ease-in-out infinite;}
.cframe[data-tier="1"] .ov-ring{opacity:1;
  box-shadow:0 0 0 2px rgba(255,152,0,.3),0 0 16px rgba(255,152,0,.2);}

.cframe[data-tier="2"] .cimg{filter:brightness(1.12) saturate(1.12);}
.cframe[data-tier="2"] .ov-glow{opacity:1;
  background:radial-gradient(ellipse at 50% 60%,rgba(255,193,7,.35) 0%,rgba(255,152,0,.15) 55%,transparent 75%);
  animation:glow-breathe 2.2s ease-in-out infinite;}
.cframe[data-tier="2"] .ov-ring{opacity:1;animation:ring-gold 2.2s ease-in-out infinite;
  box-shadow:0 0 0 3px rgba(255,152,0,.5),0 0 24px rgba(255,152,0,.35);}
.cframe[data-tier="2"] .ov-crown{opacity:1;font-size:2rem;animation:crown-float 2.5s ease-in-out infinite;}

.cframe[data-tier="3"] .cimg{filter:brightness(1.15) saturate(1.2) contrast(1.05);}
.cframe[data-tier="3"] .ov-glow{opacity:1;
  background:radial-gradient(ellipse at 50% 40%,rgba(255,235,59,.4) 0%,rgba(255,193,7,.25) 40%,transparent 70%);
  animation:glow-breathe 1.8s ease-in-out infinite;}
.cframe[data-tier="3"] .ov-ring{opacity:1;animation:ring-gold 1.8s ease-in-out infinite;
  box-shadow:0 0 0 3px rgba(255,152,0,.6),0 0 32px rgba(255,152,0,.45);}
.cframe[data-tier="3"] .ov-rays{opacity:1;
  background:repeating-conic-gradient(rgba(255,235,100,.2) 0deg,transparent 8deg,rgba(255,235,100,.1) 16deg,transparent 24deg);
  animation:rays-spin 10s linear infinite;}
.cframe[data-tier="3"] .ov-crown{opacity:1;font-size:2.3rem;top:-28px;animation:crown-float 2s ease-in-out infinite;}

.cframe[data-tier="4"] .cimg{filter:brightness(1.18) saturate(1.35) contrast(1.1);}
.cframe[data-tier="4"] .ov-glow{opacity:1;
  background:radial-gradient(ellipse at 50% 50%,rgba(186,104,200,.4) 0%,rgba(255,152,0,.25) 35%,rgba(156,39,176,.18) 60%,transparent 85%);
  animation:glow-cosmic 1.5s ease-in-out infinite;}
.cframe[data-tier="4"] .ov-ring{opacity:1;animation:ring-cosmic 1.5s ease-in-out infinite;
  box-shadow:0 0 0 3px rgba(186,104,200,.7),0 0 28px rgba(186,104,200,.5),0 0 50px rgba(255,152,0,.3);}
.cframe[data-tier="4"] .ov-rays{opacity:1;inset:-50px;
  background:repeating-conic-gradient(rgba(186,104,200,.25) 0deg,transparent 7deg,rgba(255,193,7,.15) 14deg,transparent 21deg);
  animation:rays-spin 7s linear infinite;}
.cframe[data-tier="4"] .ov-crown{opacity:1;font-size:2.6rem;top:-30px;animation:crown-divine 1.5s ease-in-out infinite;
  filter:drop-shadow(0 0 12px #ba68c8) drop-shadow(0 0 24px #9c27b0);}
/* Lightning effect for tier 4 */
.cframe[data-tier="4"]::before{content:'';position:absolute;inset:-20px;z-index:0;pointer-events:none;
  background:radial-gradient(circle at 30% 40%,rgba(255,255,255,.4) 0%,transparent 2%),
             radial-gradient(circle at 70% 60%,rgba(255,255,255,.3) 0%,transparent 2%),
             radial-gradient(circle at 50% 20%,rgba(255,255,255,.35) 0%,transparent 1.5%);
  opacity:0;animation:lightning-flash 3s ease-in-out infinite;}

.cframe[data-tier="5"] .cimg{filter:brightness(1.22) saturate(1.45) contrast(1.12) hue-rotate(5deg);}
.cframe[data-tier="5"] .ov-glow{opacity:1;
  background:radial-gradient(ellipse at 50% 50%,rgba(103,58,183,.45) 0%,rgba(63,81,181,.3) 30%,rgba(0,150,136,.25) 55%,transparent 85%);
  animation:glow-galaxy 1.2s ease-in-out infinite;}
.cframe[data-tier="5"] .ov-ring{opacity:1;animation:ring-galaxy 1.2s ease-in-out infinite;
  box-shadow:0 0 0 4px rgba(103,58,183,.8),0 0 32px rgba(103,58,183,.6),0 0 64px rgba(0,150,136,.4);}
.cframe[data-tier="5"] .ov-rays{opacity:1;inset:-65px;
  background:repeating-conic-gradient(rgba(103,58,183,.3) 0deg,rgba(0,150,136,.25) 5deg,transparent 10deg,rgba(63,81,181,.25) 15deg,transparent 20deg);
  animation:rays-spin 5s linear infinite;}
.cframe[data-tier="5"] .ov-crown{opacity:1;font-size:2.8rem;top:-32px;animation:crown-divine 1.2s ease-in-out infinite;
  filter:drop-shadow(0 0 16px #673ab7) drop-shadow(0 0 32px #3f51b5);}
/* Rainbow effect for tier 5 */
.cframe[data-tier="5"]::after{content:'';position:absolute;inset:-40px;z-index:0;pointer-events:none;
  background:conic-gradient(from 0deg,rgba(255,0,0,.2),rgba(255,127,0,.2),rgba(255,255,0,.2),
                            rgba(0,255,0,.2),rgba(0,127,255,.2),rgba(75,0,130,.2),rgba(148,0,211,.2),rgba(255,0,0,.2));
  filter:blur(20px);opacity:.6;animation:rainbow-spin 8s linear infinite;}

.cframe[data-tier="6"] .cimg{filter:brightness(1.28) saturate(1.55) contrast(1.15);}
.cframe[data-tier="6"] .ov-glow{opacity:1;
  background:radial-gradient(ellipse at 50% 40%,rgba(255,255,200,.5) 0%,rgba(255,193,7,.4) 25%,rgba(233,30,99,.3) 50%,rgba(103,58,183,.25) 75%,transparent 95%);
  animation:glow-transcend .9s ease-in-out infinite;}
.cframe[data-tier="6"] .ov-ring{opacity:1;animation:ring-transcend .9s ease-in-out infinite;
  box-shadow:0 0 0 4px rgba(255,193,7,.8),0 0 32px rgba(255,193,7,.6),0 0 64px rgba(255,152,0,.5);}
.cframe[data-tier="6"] .ov-rays{opacity:1;inset:-80px;
  background:repeating-conic-gradient(rgba(255,255,150,.35) 0deg,rgba(255,193,7,.25) 5deg,transparent 10deg,rgba(0,188,212,.3) 15deg,transparent 20deg);
  animation:rays-spin 4s linear infinite;}
.cframe[data-tier="6"] .ov-crown{opacity:1;font-size:3rem;top:-34px;animation:crown-divine .9s ease-in-out infinite;
  filter:drop-shadow(0 0 20px #ffd54f) drop-shadow(0 0 40px #ff9800);}
/* Cosmic aura for tier 6 */
.cframe[data-tier="6"] .ov-aura{opacity:1;
  background:radial-gradient(ellipse at 50% 50%,rgba(255,255,255,.2) 0%,rgba(255,193,7,.15) 30%,rgba(233,30,99,.1) 60%,transparent 80%);
  animation:cosmic-pulse 1.5s ease-in-out infinite;}

.cframe[data-tier="7"] .cimg{animation:img-god 2s ease-in-out infinite;}
.cframe[data-tier="7"] .ov-glow{opacity:1;
  background:radial-gradient(ellipse at 50% 50%,rgba(255,255,255,.6) 0%,rgba(255,193,7,.5) 20%,rgba(255,87,34,.4) 40%,rgba(233,30,99,.3) 60%,rgba(103,58,183,.25) 80%,transparent 100%);
  animation:glow-god .65s ease-in-out infinite;}
.cframe[data-tier="7"] .ov-ring{opacity:1;animation:ring-god .65s ease-in-out infinite;
  box-shadow:0 0 0 5px rgba(255,255,255,.9),0 0 28px rgba(255,193,7,.7),0 0 64px rgba(255,152,0,.6),0 0 100px rgba(186,104,200,.35);}
.cframe[data-tier="7"] .ov-rays{opacity:1;inset:-100px;
  background:repeating-conic-gradient(rgba(255,235,59,.4) 0deg,rgba(255,152,0,.3) 4deg,rgba(233,30,99,.35) 8deg,rgba(156,39,176,.3) 12deg,rgba(0,150,136,.35) 16deg,rgba(0,188,212,.3) 20deg,transparent 24deg);
  animation:rays-spin 2.5s linear infinite;}
.cframe[data-tier="7"] .ov-crown{opacity:1;font-size:3.5rem;top:-36px;animation:crown-god .65s ease-in-out infinite;
  filter:drop-shadow(0 0 28px #ffff00) drop-shadow(0 0 56px #ff9800) drop-shadow(0 0 84px #ff5722);}
.cframe[data-tier="7"] .ov-godlabel{opacity:1;font-size:1.05rem;animation:godlabel 0.8s ease-in-out infinite;}
/* Divine explosion for tier 7 */
.cframe[data-tier="7"] .ov-divine{opacity:1;
  animation:divine-explosion 2s ease-in-out infinite;}

/* ═══════════════════════════════════
   KEYFRAMES
   ═══════════════════════════════════ */
@keyframes glow-breathe{0%,100%{opacity:.65}50%{opacity:1}}
@keyframes glow-cosmic{0%,100%{opacity:.72;filter:hue-rotate(0deg)}50%{opacity:1;filter:hue-rotate(22deg)}}
@keyframes glow-galaxy{0%,100%{opacity:.78;filter:hue-rotate(0deg)}33%{opacity:1;filter:hue-rotate(45deg)}66%{opacity:.88;filter:hue-rotate(90deg)}}
@keyframes glow-transcend{0%,100%{opacity:.85}50%{opacity:1}}
@keyframes glow-god{0%,100%{opacity:.88;filter:hue-rotate(0deg)}20%{filter:hue-rotate(30deg);opacity:1}40%{filter:hue-rotate(60deg)}60%{filter:hue-rotate(90deg);opacity:1}80%{filter:hue-rotate(120deg)}}
@keyframes ring-gold{0%,100%{opacity:.88}50%{opacity:1}}
@keyframes ring-cosmic{0%,100%{opacity:.88;filter:hue-rotate(0deg)}50%{opacity:1;filter:hue-rotate(28deg)}}
@keyframes ring-galaxy{0%,100%{opacity:.9;filter:hue-rotate(0deg)}33%{opacity:1;filter:hue-rotate(60deg)}66%{filter:hue-rotate(120deg)}}
@keyframes ring-transcend{0%,100%{opacity:.92}50%{opacity:1}}
@keyframes ring-god{0%,100%{filter:hue-rotate(0deg)}25%{filter:hue-rotate(45deg)}50%{filter:hue-rotate(90deg)}75%{filter:hue-rotate(135deg)}}
@keyframes rays-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes crown-float{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}
@keyframes crown-divine{0%,100%{transform:translateX(-50%) translateY(0) scale(1)}50%{transform:translateX(-50%) translateY(-8px) scale(1.1)}}
@keyframes crown-god{
  0%,100%{transform:translateX(-50%) translateY(0) scale(1);filter:drop-shadow(0 0 20px #ffff00) drop-shadow(0 0 40px #ff9800) hue-rotate(0deg);}
  25%{transform:translateX(-50%) translateY(-10px) scale(1.15);filter:drop-shadow(0 0 28px #ff9800) drop-shadow(0 0 52px #ff6f00) hue-rotate(40deg);}
  50%{transform:translateX(-50%) translateY(-5px) scale(1.08);filter:drop-shadow(0 0 24px #ff6f00) drop-shadow(0 0 48px #e91e63) hue-rotate(80deg);}
  75%{transform:translateX(-50%) translateY(-12px) scale(1.18);filter:drop-shadow(0 0 32px #e91e63) drop-shadow(0 0 60px #9c27b0) hue-rotate(120deg);}
}
@keyframes img-god{
  0%,100%{filter:brightness(1.4) saturate(1.8) contrast(1.15) hue-rotate(0deg);}
  33%{filter:brightness(1.55) saturate(2) contrast(1.2) hue-rotate(12deg);}
  66%{filter:brightness(1.45) saturate(1.9) contrast(1.17) hue-rotate(6deg);}
}
@keyframes godlabel{
  0%,100%{text-shadow:0 0 18px #ff9800,0 0 36px #ff6f00;opacity:.92;}
  50%{text-shadow:0 0 36px #ff9800,0 0 72px #ff6f00,0 0 108px #ff5722;opacity:1;}
}
@keyframes sparkle-up{
  0%{transform:translateY(0) scale(.5);opacity:0;}
  20%{opacity:1;transform:translateY(-12px) scale(1);}
  80%{opacity:.65;}
  100%{transform:translateY(-50px) scale(.2);opacity:0;}
}
@keyframes flash-ok{0%{box-shadow:0 0 0 0 rgba(76,175,80,.9)}100%{box-shadow:0 0 0 32px rgba(76,175,80,0)}}
@keyframes flash-bad{0%{box-shadow:0 0 0 0 rgba(244,67,54,.9)}100%{box-shadow:0 0 0 30px rgba(244,67,54,0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes pulse-scale{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
/* Lightning flash animation for tier 4+ */
@keyframes lightning-flash{
  0%,92%,100%{opacity:0;}
  93%{opacity:.4;}
  94%{opacity:0;}
  95%{opacity:.6;}
  96%{opacity:0;}
  97%{opacity:.5;}
  98%{opacity:0;}
}
/* Rainbow spin for tier 5+ */
@keyframes rainbow-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
/* Cosmic aura pulse for tier 6+ */
@keyframes cosmic-pulse{
  0%,100%{transform:scale(1);opacity:.3;}
  50%{transform:scale(1.15);opacity:.5;}
}
/* Divine explosion for tier 7 */
@keyframes divine-explosion{
  0%,100%{transform:scale(1);opacity:.4;filter:hue-rotate(0deg);}
  25%{transform:scale(1.2);opacity:.7;filter:hue-rotate(90deg);}
  50%{transform:scale(1.1);opacity:.5;filter:hue-rotate(180deg);}
  75%{transform:scale(1.3);opacity:.8;filter:hue-rotate(270deg);}
}

/* ── PROBABILITY BAR ── */
.prob-box{width:100%;background:var(--panel);border:1px solid var(--border);
  border-radius:10px;padding:10px 12px;}
.prob-row{display:flex;justify-content:space-between;font-size:.75rem;
  color:var(--dim);margin-bottom:6px;}
.prob-val{font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;}
.prob-track{height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden;}
.prob-fill{height:100%;border-radius:3px;transition:width .45s ease,background .45s ease;}

/* ── STATS ROW ── */
.stats-row{display:flex;gap:10px;width:100%;}
.stat-box{flex:1;background:var(--panel);border:1px solid var(--border);
  border-radius:10px;padding:8px 10px;text-align:center;}
.slabel{font-size:.68rem;color:var(--dim);margin-bottom:3px;}
.sval{font-size:.95rem;font-weight:700;color:var(--gold);font-variant-numeric:tabular-nums;}

/* ── BUTTONS ── */
.btn{border:none;border-radius:10px;font-family:var(--font);font-weight:700;
  cursor:pointer;transition:transform .12s,filter .12s,opacity .2s,box-shadow .2s;}
.btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.15);}
.btn:active:not(:disabled){transform:translateY(0);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-row{display:flex;gap:8px;width:100%;}
.btn-evolve{flex:1;padding:12px 14px;font-size:.95rem;
  background:linear-gradient(135deg,#9c27b0,#673ab7);color:#fff;
  box-shadow:0 4px 12px rgba(156,39,176,.25);}
.btn-retire{flex:1;padding:12px 14px;font-size:.95rem;
  background:linear-gradient(135deg,#ff9800,#ff6f00);color:#fff;
  box-shadow:0 4px 12px rgba(255,152,0,.25);}
.btn-store{flex:1;padding:10px 10px;font-size:.8rem;
  background:linear-gradient(135deg,#607d8b,#455a64);color:#fff;}
.btn-retrieve{flex:1;padding:10px 10px;font-size:.8rem;
  background:linear-gradient(135deg,#388e3c,#2e7d32);color:#fff;}
.btn-buy{padding:8px 10px;font-size:.76rem;
  background:linear-gradient(135deg,#d32f2f,#c62828);color:#fff;
  white-space:nowrap;flex-shrink:0;}

/* ── PROTECTION PILL ── */
.prot-pill{display:flex;align-items:center;justify-content:center;gap:7px;
  width:100%;padding:8px 14px;border-radius:10px;
  background:var(--panel);border:1px solid var(--border);
  font-size:.82rem;color:var(--text);}
.prot-cnt{font-weight:900;font-size:1.15rem;color:var(--cyan);font-variant-numeric:tabular-nums;}

/* ── STORAGE ── */
.slot{border:2px dashed var(--border);border-radius:12px;padding:13px;
  min-height:80px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:4px;color:var(--dim);font-size:.8rem;
  text-align:center;transition:border-color .3s,background .3s;}
.slot.has-item{border-color:var(--gold);border-style:solid;background:rgba(255,152,0,.08);}
.slevel{font-size:1.05rem;font-weight:900;color:var(--gold);}
.sname{font-size:.85rem;color:var(--text);font-weight:600;}
.sprice{font-size:.72rem;color:var(--dim);}

/* ── SHOP ── */
.shop-item{display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--border);gap:8px;}
.shop-item:last-child{border-bottom:none;}
.sinfo{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0;}
.sinfo .sn{font-size:.83rem;font-weight:700;white-space:nowrap;}
.sinfo .sd{font-size:.7rem;color:var(--dim);}

/* ── LOG ── */
.log-wrap{width:100%;margin-top:16px;}
.log-panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.log-hdr{padding:10px 15px;background:var(--panel);border-bottom:1px solid var(--border);
  font-size:.7rem;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;}
.log-body{max-height:180px;overflow-y:auto;padding:8px 13px;display:flex;flex-direction:column;gap:2px;}
.log-body::-webkit-scrollbar{width:4px;}
.log-body::-webkit-scrollbar-track{background:transparent;}
.log-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.le{font-size:.76rem;font-family:'Consolas','Courier New',monospace;padding:2px 0;line-height:1.6;}
.le.ok{color:#4caf50;font-weight:600}
.le.fail{color:#f44336;font-weight:600}
.le.info{color:var(--cyan)}
.le.gold{color:var(--gold);font-weight:600}
.le.sp{color:#e91e63;font-weight:700}

/* ── DEBUG MODAL ── */
#debugModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:9999;align-items:center;justify-content:center;}
#debugModal.show{display:flex;}
.debug-content{background:var(--bg2);border-radius:12px;padding:20px;
  max-width:300px;width:90%;box-shadow:0 10px 40px rgba(0,0,0,.3);}
.debug-title{font-size:1.1rem;font-weight:900;color:var(--purple);margin-bottom:16px;}
.debug-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;
  margin-bottom:10px;font-family:var(--font);font-size:.9rem;}
.debug-button{width:100%;padding:10px;background:var(--purple);color:#fff;
  border:none;border-radius:6px;font-weight:700;cursor:pointer;margin-bottom:8px;}
.debug-button:hover{background:#7b1fa2;}
.debug-close{width:100%;padding:10px;background:var(--border);color:var(--text);
  border:none;border-radius:6px;font-weight:700;cursor:pointer;}

@media(max-width:600px){
  #app{padding:0;}
  .mobile-container{padding:16px 12px 100px;}
  .cframe{width:240px;height:320px;}
  .hdr{padding:10px 12px;}
  .hdr-title{font-size:1rem;}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-title">✨ 한영애 키우기</div>
  <div style="display:flex;gap:12px;align-items:center;">
    <div class="hdr-gold">💰 <span id="goldEl">0 G</span></div>
    <button class="btn-reset" onclick="confirmReset()">초기화</button>
  </div>
</header>

<div id="app">
  <div class="mobile-container">

    <!-- ══ CHARACTER PANEL ══ -->
    <div class="panel cpanel" style="width:100%;">
      <div class="stage-badge">
        <span class="stag" id="stageTag">0단계</span>
        <span class="sname" id="stageName">동네 할머니</span>
      </div>

      <!-- Character frame -->
      <div class="cframe" id="cframe" data-tier="0">
        <div class="ov-rays" id="ovRays"></div>
        <div class="cclip" id="cclip">
          <img src="hya.png" alt="한영애" class="cimg" id="cimg"
               onerror="this.outerHTML='<div class=cimg-fallback>👵</div>'">
          <div class="ov-glow" id="ovGlow"></div>
          <div class="ov-pts" id="ovPts"></div>
        </div>
        <div class="ov-ring" id="ovRing"></div>
        <div class="ov-crown" id="ovCrown">♛</div>
        <div class="ov-godlabel" id="ovGodLabel">✦ 한영애신 ✦</div>
        <div class="ov-aura" id="ovAura"></div>
        <div class="ov-divine" id="ovDivine"></div>
      </div>

      <!-- Probability -->
      <div class="prob-box" style="width:100%;">
        <div class="prob-row">
          <span>다음 성장 성공률</span>
          <span class="prob-val" id="probTxt">-</span>
        </div>
        <div class="prob-track">
          <div class="prob-fill" id="probFill" style="width:0%"></div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-box">
          <div class="slabel">현재 은퇴가</div>
          <div class="sval" id="retireEl">0 G</div>
        </div>
        <div class="stat-box">
          <div class="slabel">총 획득 골드</div>
          <div class="sval" id="totalEl">0 G</div>
        </div>
      </div>

      <!-- Main actions -->
      <div class="btn-row" style="width:100%;">
        <button class="btn btn-evolve" id="evolveBtn" onclick="evolve()">⚡ 성장하기</button>
        <button class="btn btn-retire" id="retireBtn" onclick="retire()">💰 은퇴하기</button>
      </div>

      <!-- Storage actions -->
      <div class="btn-row" style="width:100%;">
        <button class="btn btn-store" id="storeBtn" onclick="storeChar()">📦 보관</button>
        <button class="btn btn-retrieve" id="retrieveBtn" onclick="retrieveChar()">📤 꺼내기</button>
      </div>

      <!-- Protection -->
      <div class="prot-pill">
        🛡️ 멘탈 보호권&nbsp;<span class="prot-cnt" id="shieldEl">0</span>개
      </div>
    </div>

    <!-- ══ SHOP ══ -->
    <div class="panel" style="width:100%;margin-top:16px;">
      <div class="ptitle">🏪 상점</div>

      <div class="shop-item">
        <div class="sinfo">
          <span class="sn">🛡️ 멘탈 보호권</span>
          <span class="sd">실패해도 단계 유지 · 1회 사용</span>
        </div>
        <button class="btn btn-buy" onclick="buyShield()">2M G</button>
      </div>

      <div class="shop-item">
        <div class="sinfo">
          <span class="sn">🚀 9단계 직행권</span>
          <span class="sd">성공률 50%</span>
        </div>
        <button class="btn btn-buy" onclick="buySkip(9,1000000,.5)">1M G</button>
      </div>

      <div class="shop-item">
        <div class="sinfo">
          <span class="sn">🚀 13단계 직행권</span>
          <span class="sd">성공률 30%</span>
        </div>
        <button class="btn btn-buy" onclick="buySkip(13,7000000,.3)">7M G</button>
      </div>

      <div class="shop-item">
        <div class="sinfo">
          <span class="sn">🚀 14단계 직행권</span>
          <span class="sd">성공률 15%</span>
        </div>
        <button class="btn btn-buy" onclick="buySkip(14,10000000,.15)">10M G</button>
      </div>
    </div>

    <!-- ══ STORAGE ══ -->
    <div class="panel" style="width:100%;margin-top:16px;">
      <div class="ptitle">📦 보관함 (1칸)</div>
      <div class="slot" id="storageSlot">
        <span style="font-size:1.8rem">📭</span>
        <span>비어있음</span>
      </div>
    </div>

    <!-- ══ LOG ══ -->
    <div class="log-wrap">
      <div class="log-panel">
        <div class="log-hdr">📜 성장 기록</div>
        <div class="log-body" id="logBody"></div>
      </div>
    </div>

  </div><!-- /.mobile-container -->
</div><!-- /#app -->

<!-- DEBUG MODAL -->
<div id="debugModal">
  <div class="debug-content">
    <div class="debug-title">⚙️ 디버그 모드</div>
    <div style="margin-bottom:12px;">
      <label style="font-size:.85rem;color:var(--dim);display:block;margin-bottom:4px;">확률 조정 (0-1)</label>
      <input type="number" id="debugProb" class="debug-input" min="0" max="1" step="0.01" value="0.5">
      <button class="debug-button" onclick="debugSetProb()">확률 설정</button>
    </div>
    <div style="margin-bottom:12px;">
      <label style="font-size:.85rem;color:var(--dim);display:block;margin-bottom:4px;">골드 추가</label>
      <input type="number" id="debugGold" class="debug-input" value="1000000">
      <button class="debug-button" onclick="debugAddGold()">골드 추가</button>
    </div>
    <button class="debug-close" onclick="closeDebug()">닫기</button>
  </div>
</div>

<script>
// ════════════════════════════════════════
// STAGE DATA (BALANCED)
// ════════════════════════════════════════
const STAGES = [
  {name:'동네 할머니',         prob:1.00, price:0        }, // 0
  {name:'새벽 시장 할머니',    prob:1.00, price:500      }, // 1 (500x 증가)
  {name:'소문난 할머니',       prob:0.90, price:2000     }, // 2 (6.6x 증가)
  {name:'동네 이장 할머니',    prob:0.85, price:5000     }, // 3 (10x 증가) + 실패율 +5%
  {name:'구청 민원 할머니',    prob:0.75, price:12000    }, // 4 (실패율 +5%)
  {name:'지역 방송 출연',      prob:0.65, price:28000    }, // 5 (실패율 +5%)
  {name:'전국구 전설',         prob:0.55, price:65000    }, // 6 (실패율 +5%)
  {name:'민족의 수호자',       prob:0.45, price:150000   }, // 7 (실패율 +5%)
  {name:'한반도의 어머니',     prob:0.38, price:350000   }, // 8 (실패율 +2%)
  {name:'동아시아의 수호신',   prob:0.30, price:800000   }, // 9
  {name:'대륙을 지배하는 자',  prob:0.22, price:1800000  }, // 10 (실패율 +2%)
  {name:'세계 5대 성인',       prob:0.18, price:3500000  }, // 11 (실패율 +2%)
  {name:'지구 최강 존재',      prob:0.14, price:6000000  }, // 12 (실패율 +2%)
  {name:'우주의 수호할머니',   prob:0.10, price:10000000 }, // 13
  {name:'신에 가까운 한영애',  prob:0.05, price:20000000 }, // 14
  {name:'한영애신',            prob:0.02, price:35000000 }, // 15  FINAL
];
const MAX = STAGES.length - 1; // 15

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
const DEF = {lv:0, gold:0, earned:0, shields:0, storage:null};
let G = {...DEF};
let logs = [];
let debugMode = false;
let keySequence = '';

// ════════════════════════════════════════
// DEBUG MODE
// ════════════════════════════════════════
document.addEventListener('keydown',(e)=>{
  if(debugMode) return;
  keySequence += e.key;
  if(keySequence.length>10) keySequence = keySequence.slice(-10);
  if(keySequence.includes('1557')){
    debugMode = true;
    document.getElementById('debugModal').classList.add('show');
    keySequence = '';
    addLog('🔧 디버그 모드 활성화','info');
  }
});

function closeDebug(){
  document.getElementById('debugModal').classList.remove('show');
}

function debugSetProb(){
  const prob = parseFloat(document.getElementById('debugProb').value);
  if(prob>=0 && prob<=1){
    STAGES[G.lv+1].prob = prob;
    addLog(`🔧 확률 설정: ${(prob*100).toFixed(1)}%`,'info');
    render();
  }
}

function debugAddGold(){
  const gold = parseInt(document.getElementById('debugGold').value);
  if(!isNaN(gold) && gold>0){
    G.gold += gold;
    G.earned += gold;
    addLog(`🔧 골드 추가: +${fmt(gold)}`,'gold');
    render();
  }
}

// ════════════════════════════════════════
// PERSISTENCE
// ════════════════════════════════════════
function save(){
  localStorage.setItem('hya3',JSON.stringify({G, logs:logs.slice(0,80)}));
}
function load(){
  try{
    const d = JSON.parse(localStorage.getItem('hya3')||'null');
    if(d){
      G = {...DEF,...d.G};
      logs = d.logs||[];
    }
  }catch(e){}
}

// ════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════
function fmt(n){
  if(n>=1e7) return (n/1e6).toFixed(n%1e6===0?0:1)+'M G';
  if(n>=1e6) return (n/1e6).toFixed(n%1e6===0?0:1)+'M G';
  if(n>=1000) return n.toLocaleString('ko-KR')+' G';
  return n+' G';
}
function getTier(lv){
  if(lv===0) return 0;
  if(lv<=3)  return 1;
  if(lv<=6)  return 2;
  if(lv<=9)  return 3;
  if(lv<=12) return 4;
  if(lv===13)return 5;
  if(lv===14)return 6;
  return 7;
}

// ════════════════════════════════════════
// LOG
// ════════════════════════════════════════
function addLog(msg,type='info'){
  const t = new Date().toTimeString().slice(0,8);
  logs.unshift({msg,type,t});
  if(logs.length>120) logs.length=120;
  renderLog();
}
function renderLog(){
  document.getElementById('logBody').innerHTML =
    logs.map(l=>`<div class="le ${l.type}">[${l.t}] ${l.msg}</div>`).join('');
}

// ════════════════════════════════════════
// PARTICLES
// ════════════════════════════════════════
function buildParticles(tier){
  const c = document.getElementById('ovPts');
  c.innerHTML='';
  if(tier<2) return;
  const counts=[0,0,8,14,20,26,34,50];
  const n = counts[tier]||0;
  const palettes={
    2:['rgba(255,152,0,.9)','rgba(255,193,7,.8)','rgba(255,235,59,.7)'],
    3:['rgba(255,235,59,.9)','rgba(255,255,150,.8)','rgba(255,193,7,.7)'],
    4:['rgba(186,104,200,.9)','rgba(255,152,0,.8)','rgba(156,39,176,.7)'],
    5:['rgba(103,58,183,.9)','rgba(0,150,136,.8)','rgba(63,81,181,.7)'],
    6:['rgba(255,235,59,.9)','rgba(255,193,7,.8)','rgba(0,188,212,.7)'],
    7:['rainbow'],
  };
  const pal = palettes[tier]||palettes[2];
  for(let i=0;i<n;i++){
    const el = document.createElement('div');
    const x = Math.random()*100, y = Math.random()*100;
    const sz = Math.random()*3+1.5;
    const dl = Math.random()*4, dr = Math.random()*2+1.5;
    const col = pal[0]==='rainbow'?`hsl(${Math.random()*360},100%,60%)`:pal[Math.floor(Math.random()*pal.length)];
    el.style.cssText=`position:absolute;left:${x}%;top:${y}%;width:${sz}px;height:${sz}px;
      border-radius:50%;background:${col};pointer-events:none;
      animation:sparkle-up ${dr}s ease-out ${dl}s infinite;`;
    c.appendChild(el);
  }
}

// ════════════════════════════════════════
// RENDER
// ════════════════════════════════════════
function render(){
  const lv = G.lv;
  const st = STAGES[lv];
  const tier = getTier(lv);
  const isMax = lv===MAX;
  const earned = G.earned;

  // Gold
  document.getElementById('goldEl').textContent = fmt(G.gold);

  // Stage
  document.getElementById('stageTag').textContent = `${lv}단계`;
  document.getElementById('stageName').textContent = st.name;

  // Probability
  const pFill = document.getElementById('probFill');
  const pTxt  = document.getElementById('probTxt');
  if(isMax){
    pTxt.textContent = '✨ 한영애신 달성!';
    pFill.style.width = '100%';
    pFill.style.background = 'linear-gradient(90deg,#ffb74d,#ff9800,#ff6f00,#9c27b0)';
  } else {
    const pct = Math.round(STAGES[lv+1].prob*100);
    pTxt.textContent = pct+'%';
    pFill.style.width = pct+'%';
    pFill.style.background = pct>=80?'#4caf50':pct>=50?'#ff9800':pct>=20?'#ff6f00':'#f44336';
  }

  // Stats
  document.getElementById('retireEl').textContent = fmt(st.price);
  document.getElementById('totalEl').textContent  = fmt(earned);

  // Shields
  document.getElementById('shieldEl').textContent = G.shields;

  // Button states
  document.getElementById('evolveBtn').disabled = isMax;
  document.getElementById('evolveBtn').textContent = isMax ? '✨ 최고 단계 달성!' : '⚡ 성장하기';
  document.getElementById('retireBtn').disabled   = st.price===0;
  document.getElementById('storeBtn').disabled    = G.storage!==null;
  document.getElementById('retrieveBtn').disabled = G.storage===null||lv!==0;

  // Storage slot
  const slot = document.getElementById('storageSlot');
  if(G.storage!==null){
    const ss = STAGES[G.storage];
    slot.className='slot has-item';
    slot.innerHTML=`<div class="slevel">${G.storage}단계</div>
      <div class="sname">${ss.name}</div>
      <div class="sprice">은퇴가 ${fmt(ss.price)}</div>`;
  } else {
    slot.className='slot';
    slot.innerHTML='<span style="font-size:1.8rem">📭</span><span>비어있음</span>';
  }

  // Character visual
  const frame = document.getElementById('cframe');
  const prevTier = parseInt(frame.dataset.tier||'0');
  frame.dataset.tier = tier;
  if(prevTier!==tier) buildParticles(tier);

  // Crown text by tier
  const crown = document.getElementById('ovCrown');
  crown.textContent = tier<=1?'♛':tier<=2?'♛':tier<=4?'👑':tier<=5?'✨👑✨':tier<=6?'🌟👑🌟':'⭐👑⭐';

  save();
}

// ════════════════════════════════════════
// FLASH & EFFECTS
// ════════════════════════════════════════
function flash(ok){
  const clip = document.getElementById('cclip');
  clip.style.animation='none';
  void clip.offsetHeight;
  clip.style.animation = ok ? 'flash-ok .55s ease-out' : 'flash-bad .55s ease-out';
  if(!ok){
    const fr = document.getElementById('cframe');
    fr.style.animation='shake .42s ease-in-out';
    setTimeout(()=>fr.style.animation='',450);
  }
  setTimeout(()=>clip.style.animation='',600);
}

// ════════════════════════════════════════
// GAME ACTIONS
// ════════════════════════════════════════
function evolve(){
  if(G.lv>=MAX) return;
  const nextProb = STAGES[G.lv+1].prob;
  if(Math.random()<nextProb){
    G.lv++;
    addLog(`✅ ${G.lv}단계 성장 성공! → "${STAGES[G.lv].name}"`, 'ok');
    flash(true);
    if(G.lv===MAX){
      setTimeout(()=>{
        addLog('🌏✨ 한영애신 강림!! 전 세계가 한영애의 가호를 받습니다!','sp');
        addLog('👵 "자식들아, 이제 할머니가 온 세상을 다 돌봐줄게."','sp');
        addLog('💫 세계 평화 달성. 모든 전쟁 종식. 코스피 폭등.','sp');
      },350);
    }
  } else {
    if(G.shields>0){
      G.shields--;
      addLog(`🛡️ 실패! 멘탈 보호권 발동 — ${G.lv}단계 유지. (남은 보호권: ${G.shields}개)`,'info');
      flash(true);
    } else {
      // 초반 실패: -1 ~ -2 등급 복귀 (1-3단계만)
      if(G.lv>=1 && G.lv<=3){
        const backtrack = Math.random()<0.5 ? 1 : 2;
        const prev = G.lv;
        G.lv = Math.max(0, G.lv-backtrack);
        addLog(`💥 실패! "${STAGES[prev].name}" → "${STAGES[G.lv].name}"(${G.lv}단계)로 후퇴...`, 'fail');
      } else {
        const lost = G.lv;
        G.lv = 0;
        addLog(`💀 실패! "${STAGES[lost].name}"(${lost}단계) → 동네 할머니로 추락...`,'fail');
      }
      flash(false);
    }
  }
  render();
}

function retire(){
  const price = STAGES[G.lv].price;
  if(price===0){addLog('0단계는 은퇴할 수 없습니다.','info');return;}
  G.gold   += price;
  G.earned += price;
  addLog(`💰 "${STAGES[G.lv].name}"(${G.lv}단계) 은퇴! +${fmt(price)} 획득`,'gold');
  G.lv = 0;
  render();
}

function buyShield(){
  const cost=2000000;
  if(G.gold<cost){addLog(`❌ 골드 부족 (보유 ${fmt(G.gold)} / 필요 ${fmt(cost)})`,'fail');return;}
  G.gold-=cost; G.shields++;
  addLog(`🛡️ 멘탈 보호권 구매! 현재 ${G.shields}개 보유`,'info');
  render();
}

function buySkip(target,cost,chance){
  if(G.gold<cost){addLog(`❌ 골드 부족 (보유 ${fmt(G.gold)} / 필요 ${fmt(cost)})`,'fail');return;}
  G.gold-=cost;
  if(Math.random()<chance){
    G.lv=target;
    addLog(`🚀 ${target}단계 직행 성공! → "${STAGES[target].name}"`,'sp');
    flash(true);
  } else {
    addLog(`💸 ${target}단계 직행 실패... ${fmt(cost)} 증발`,'fail');
    flash(false);
  }
  render();
}

function storeChar(){
  if(G.storage!==null){addLog('❌ 보관함이 가득 찼습니다.','fail');return;}
  const lv=G.lv;
  G.storage=lv; G.lv=0;
  addLog(`📦 "${STAGES[lv].name}"(${lv}단계) → 보관함에 보관.`,'info');
  render();
}

function retrieveChar(){
  if(G.storage===null){addLog('❌ 보관함이 비어있습니다.','fail');return;}
  if(G.lv!==0){addLog('❌ 현재 0단계일 때만 꺼낼 수 있습니다.','fail');return;}
  const lv=G.storage;
  G.lv=lv; G.storage=null;
  addLog(`📤 "${STAGES[lv].name}"(${lv}단계) → 복귀!`,'info');
  flash(true);
  render();
}

function confirmReset(){
  if(confirm('⚠️ 모든 데이터를 초기화할까요?\n이 작업은 되돌릴 수 없습니다.')){
    G={...DEF}; logs=[];
    localStorage.removeItem('hya3');
    buildParticles(0);
    addLog('🔄 초기화 완료. 다시 시작합니다!','info');
    render();
  }
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
load();
buildParticles(getTier(G.lv));
render();
if(logs.length===0){
  addLog('🎮 한영애 키우기 시작! 동네 할머니를 한영애신으로 키워보세요.','info');
  addLog('💡 1-3단계에서 실패하면 -1~-2등급으로 후퇴합니다. (위험!)','info');
  addLog('🛡️ 멘탈 보호권으로 실패를 방어하세요.','info');
}
renderLog();
</script>
</body>
</html>
